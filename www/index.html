<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CK Sir STT Plan App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Sinhala:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stt-styles.css?v=100">
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body {
      overscroll-behavior: none;
      background: #050a06;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="error-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,0,0,0.8);color:white;z-index:9999;display:none;padding:20px;font-family:monospace;white-space:pre-wrap;overflow:auto;"></div>
  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('error-overlay').style.display = 'block';
      document.getElementById('error-overlay').innerText += 'ERROR: ' + e.message + '\n' + (e.error && e.error.stack ? e.error.stack : '') + '\n\n';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('error-overlay').style.display = 'block';
      document.getElementById('error-overlay').innerText += 'PROMISE ERROR: ' + e.reason + '\n\n';
    });
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="stt-data.js?v=103"></script>
  <script type="text/babel" src="stt-tree.jsx?v=103"></script>
  <script type="text/babel" src="stt-hooks.jsx?v=103"></script>
  <script type="text/babel" src="stt-ui.jsx?v=103"></script>
  <script type="text/babel" src="stt-tasks.jsx?v=103"></script>
  <script type="text/babel" src="stt-app.jsx?v=103"></script>

  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById('root')).render(<SttApp/>);
  </script>
</body>
</html>
